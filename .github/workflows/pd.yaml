name: Test containerized application with Playwright
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment to run tests against'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - local
      project:
        description: 'Select the Playwright project to run'
        required: true
        default: chromium
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit

jobs:
  test_app:
    runs-on: ubuntu-24.04-arm
    
        
    # 2. Дополнительные контейнеры (sidecars)
    services:
      postgres_db:
        image: pocketaces2/fashionhub-demo-app:latest
        ports:
          - 4000:4000

    
    # 1. Основной контейнер для шагов
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      env:
        USER_NAME: ${{ secrets.USER_NAME }}
        PASSWORD: ${{ secrets.PASSWORD }}
        CONFIG_FILE: playwright.config.${{ github.event.inputs.environment }}.ts
        PROJECT: ${{ github.event.inputs.project }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Run tests
        run: |
          npm install
          #CONFIG_FILE=playwright.config.${{ github.event.inputs.environment }}.ts
          #PROJECT=${{ github.event.inputs.project }}
          echo "Running Playwright tests using ${CONFIG_FILE} on project ${PROJECT}"
          if [ "${PROJECT}" = "all" ]; then
            npx playwright test --config=${CONFIG_FILE}
          else
            npx playwright test --config=${CONFIG_FILE} --project=${PROJECT}
          fi

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

