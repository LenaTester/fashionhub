name: Test containerized application with Playwright
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment to run tests against'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - local
      project:
        description: 'Select the Playwright project to run'
        required: true
        default: chromium
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit

jobs:
  test_app:
    runs-on: ubuntu-24.04-arm
    
        
    # 2. Дополнительные контейнеры (sidecars)
    services:
      app:
        image: pocketaces2/fashionhub-demo-app:latest
        ports:
          - 4000:4000

    
    # 1. Основной контейнер для шагов
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      env:
        USER_NAME: ${{ secrets.USER_NAME }}
        PASSWORD: ${{ secrets.PASSWORD }}
        PROJECT: ${{ github.event.inputs.project }}
        PLAYWRIGHT_ENV: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Run tests
        env:
          RUN_IN_DOCKER: ${{ github.event.inputs.environment == 'local' && 'true' || 'false' }}
        run: |
          npm install
  
          echo "Running Playwright tests using ${CONFIG_FILE} on project ${PROJECT}"
          if [ "${PROJECT}" = "all" ]; then
            npx playwright test
          else
            npx playwright test --project=${PROJECT}
          fi

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

