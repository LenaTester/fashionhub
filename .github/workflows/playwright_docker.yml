name: Playwright Tests (Unified)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - local
      project:
        description: 'Select Playwright project'
        required: true
        default: chromium
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit

jobs:
  test:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      # 🐳 Docker buildx for caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🧠 Build Playwright image (cached)
      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: playwright-tests
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =========================
      # 🏠 LOCAL (docker-compose)
      # =========================
      - name: Run auth setup tests (local)
        if: ${{ github.event.inputs.environment == 'local' }}
        env:
          USER_NAME: ${{ secrets.USER_NAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          PLAYWRIGHT_ENV: local
        run: |
          docker compose run --rm tests npx playwright test tests/auth.setup.spec.ts --project=chromium

      - name: Run tests (local via docker-compose)
        if: ${{ github.event.inputs.environment == 'local' }}
        env:
          USER_NAME: ${{ secrets.USER_NAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          PLAYWRIGHT_ENV: local
          PROJECT: ${{ github.event.inputs.project }}
        run: |
          docker compose up --abort-on-container-exit --exit-code-from tests

      # =========================
      # 🌍 STAGING / PRODUCTION
      # =========================
      - name: Run auth setup tests (remote envs)
        if: ${{ github.event.inputs.environment != 'local' }}
        run: |
          docker run --rm \
            -e USER_NAME=${{ secrets.USER_NAME }} \
            -e PASSWORD=${{ secrets.PASSWORD }} \
            -e PLAYWRIGHT_ENV=${{ github.event.inputs.environment }} \
            playwright-tests \
            bash -c "
              echo 'Running auth setup on ${{ github.event.inputs.environment }}'
              npx playwright test tests/auth.setup.spec.ts --project=chromium
            "

      - name: Run tests (remote envs)
        if: ${{ github.event.inputs.environment != 'local' }}
        run: |
          docker run --rm \
            -e USER_NAME=${{ secrets.USER_NAME }} \
            -e PASSWORD=${{ secrets.PASSWORD }} \
            -e PLAYWRIGHT_ENV=${{ github.event.inputs.environment }} \
            playwright-tests \
            bash -c "
              echo 'Running on ${{ github.event.inputs.environment }}'
              if [ '${{ github.event.inputs.project }}' = 'all' ]; then
                npx playwright test --grep-invert auth.setup
              else
                npx playwright test --project=${{ github.event.inputs.project }} --grep-invert auth.setup
              fi
            "

      # 🧹 Cleanup (only matters for compose)
      - name: Tear down containers
        if: always()
        run: docker compose down -v || true

      # 📦 Upload report
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30