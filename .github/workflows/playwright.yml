name: Playwright Tests
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment to run tests against'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - local
      project:
        description: 'Select the Playwright project to run'
        required: true
        default: chromium
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-24.04-arm
    environment: ${{ github.event.inputs.environment }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Cache Node modules
      id: cache-node-modules
      uses: actions/cache@v3
      with:
        path: node_modules
        key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-modules-
    - name: Cache Playwright browsers
      id: cache-playwright
      uses: actions/cache@v3
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-
    - name: Install dependencies
      if: steps.cache-node-modules.outputs.cache-hit != 'true'
      run: npm ci
    - name: Start local app (if local environment)
      if: ${{ github.event.inputs.environment == 'local' }}
      run: |
        docker run -d --name fashionhub-app -p 4000:4000 pocketaces2/fashionhub-demo-app:latest
        # Wait for app to be ready
        timeout 60 bash -c 'until curl -f http://localhost:4000/fashionhub/; do sleep 2; done'
    - name: Install Playwright Browsers
      if: steps.cache-playwright.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      env:
        USER_NAME: ${{ secrets.USER_NAME }}
        PASSWORD: ${{ secrets.PASSWORD }}
      run: |
        CONFIG_FILE=playwright.config.${{ github.event.inputs.environment }}.ts
        echo "Running Playwright tests using ${CONFIG_FILE} on project ${{ github.event.inputs.project }}"
        if [ "${{ github.event.inputs.project }}" = "all" ]; then
          npx playwright test --config=${CONFIG_FILE}
        else
          npx playwright test --config=${CONFIG_FILE} --project=${{ github.event.inputs.project }}
        fi
    - name: Stop local app (if local environment)
      if: ${{ github.event.inputs.environment == 'local' }}
      run: |
        docker stop fashionhub-app
        docker rm fashionhub-app
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
