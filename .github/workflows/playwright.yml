name: Playwright Tests
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment to run tests against'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - local
      project:
        description: 'Select the Playwright project to run'
        required: true
        default: chromium
        type: choice
        options:
          - chromium
          - firefox
          - webkit
jobs:
  test:
    timeout-minutes: 60
    if: ${{ github.event.inputs.environment == 'production' || github.event.inputs.environment == 'staging' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      env:
        USER_NAME: ${{ secrets.USER_NAME }}
        PASSWORD: ${{ secrets.PASSWORD }}
      run: PLAYWRIGHT_ENV=${{ github.event.inputs.environment }} npx playwright test --project=${{ github.event.inputs.project }}
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
